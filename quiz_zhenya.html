<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Что тормозит твою жизнь — разбор</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #F5F0E8;
  --dark: #1C1A17;
  --gold: #C9A96E;
  --gold-light: #E8D5B0;
  --muted: #8A8070;
  --card-bg: #FDFAF4;
  --border: rgba(201,169,110,0.25);
}

html { font-size: 16px; }

body {
  background: var(--cream);
  color: var(--dark);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

.wrap {
  width: 100%;
  max-width: 560px;
}

/* PROGRESS */
.progress-bar {
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 2.5rem;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* SCREEN */
.screen { display: none; animation: fadeIn 0.4s ease; }
.screen.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* INTRO */
.intro-eyebrow {
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.25rem;
}

.intro-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 6vw, 2.8rem);
  font-weight: 300;
  line-height: 1.15;
  color: var(--dark);
  margin-bottom: 1.25rem;
}

.intro-title em {
  font-style: italic;
  color: var(--gold);
}

.intro-sub {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 2.5rem;
  max-width: 420px;
}

.btn-primary {
  display: inline-block;
  background: var(--dark);
  color: var(--cream);
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 14px 36px;
  border: none;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.btn-primary:hover { background: #2d2a24; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.intro-note {
  margin-top: 1.25rem;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.03em;
}

/* QUESTION */
.q-zone {
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.75rem;
}

.q-number {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 1.5rem;
}

.q-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.4rem, 4vw, 1.75rem);
  font-weight: 300;
  line-height: 1.35;
  color: var(--dark);
  margin-bottom: 2rem;
}

.options { display: flex; flex-direction: column; gap: 10px; }

.option {
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 14px 18px;
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: var(--dark);
  line-height: 1.5;
  text-align: left;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  position: relative;
}

.option::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--gold);
  transform: scaleY(0);
  transition: transform 0.2s;
}

.option:hover {
  border-color: var(--gold);
  background: #FBF7EF;
  transform: translateX(3px);
}

.option:hover::before { transform: scaleY(1); }

.option.selected {
  border-color: var(--gold);
  background: #FBF7EF;
  transform: translateX(3px);
}
.option.selected::before { transform: scaleY(1); }

/* RESULT */
.result-eyebrow {
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1rem;
}

.result-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 300;
  line-height: 1.2;
  margin-bottom: 2rem;
}

.result-block {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
}

.result-block-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.5rem;
}

.result-block-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 400;
  margin-bottom: 0.5rem;
  color: var(--dark);
}

.result-block-text {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.65;
}

.result-block-text strong {
  color: var(--dark);
  font-weight: 400;
}

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2rem 0;
}

.offer-block {
  text-align: center;
  padding: 2rem 1.5rem;
  background: var(--dark);
  color: var(--cream);
}

.offer-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.75rem;
}

.offer-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.3rem, 4vw, 1.7rem);
  font-weight: 300;
  line-height: 1.3;
  margin-bottom: 0.75rem;
  color: var(--cream);
}

.offer-text {
  font-size: 13px;
  color: rgba(245,240,232,0.6);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.btn-offer {
  display: inline-block;
  background: var(--gold);
  color: var(--dark);
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 14px 36px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.2s, transform 0.15s;
  margin-bottom: 0.75rem;
}
.btn-offer:hover { opacity: 0.9; transform: translateY(-1px); }

.offer-price {
  font-size: 12px;
  color: rgba(245,240,232,0.45);
  margin-top: 0.5rem;
}

/* decorative line */
.deco-line {
  width: 40px;
  height: 1px;
  background: var(--gold);
  margin: 1.5rem 0;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- INTRO -->
  <div class="screen active" id="screen-intro">
    <div class="intro-eyebrow">Астро-разбор</div>
    <h1 class="intro-title">Что сейчас<br><em>тормозит</em><br>твою жизнь</h1>
    <p class="intro-sub">6 вопросов — и ты узнаешь, где именно застряла энергия: в деньгах, отношениях или внутреннем состоянии. Без воды, без предсказаний — только честный разбор.</p>
    <button class="btn-primary" onclick="startQuiz()">Начать разбор</button>
    <p class="intro-note">Занимает 2 минуты · Бесплатно</p>
  </div>

  <!-- QUESTIONS -->
  <div class="screen" id="screen-q"></div>

  <!-- RESULT -->
  <div class="screen" id="screen-result"></div>
</div>

<script>
const questions = [
  {
    zone: "Деньги",
    text: "Когда думаешь о деньгах — что первым приходит в голову?",
    options: [
      { text: "Их всегда не хватает, сколько бы ни зарабатывала", score: { money: 2 } },
      { text: "Зарабатываю нормально, но куда уходит — непонятно", score: { money: 1 } },
      { text: "Хочу больше, но не знаю как и боюсь пробовать", score: { money: 2 } },
      { text: "В целом ок, но ощущение что могу лучше", score: { money: 1 } }
    ]
  },
  {
    zone: "Деньги",
    text: "Как ты принимаешь финансовые решения?",
    options: [
      { text: "Откладываю, жду «правильного момента» — он не наступает", score: { money: 2 } },
      { text: "Действую импульсивно, потом жалею", score: { money: 1 } },
      { text: "Советуюсь с кем-то, сама не доверяю себе", score: { money: 2 } },
      { text: "Стараюсь думать, но тревога мешает мыслить чётко", score: { money: 1 } }
    ]
  },
  {
    zone: "Отношения",
    text: "Что сейчас происходит в твоих отношениях или в их отсутствии?",
    options: [
      { text: "Одно и то же по кругу — разные люди, одна история", score: { relations: 2 } },
      { text: "Отношения есть, но что-то важное между нами потерялось", score: { relations: 2 } },
      { text: "Хочу близости, но сближение пугает", score: { relations: 1 } },
      { text: "Устала объяснять себе почему снова не то", score: { relations: 1 } }
    ]
  },
  {
    zone: "Отношения",
    text: "Как ты чувствуешь себя рядом с близкими людьми?",
    options: [
      { text: "Даю больше чем получаю — и злюсь на это", score: { relations: 2 } },
      { text: "Теряю себя — не знаю где кончаюсь я и начинается другой", score: { relations: 2 } },
      { text: "Хорошо, но боюсь что всё изменится", score: { relations: 1 } },
      { text: "Одиноко даже когда рядом есть люди", score: { relations: 1 } }
    ]
  },
  {
    zone: "Состояние",
    text: "Как бы ты описала своё внутреннее состояние прямо сейчас?",
    options: [
      { text: "Устала. Не физически — а где-то глубже", score: { state: 2 } },
      { text: "Тревога фоном — даже когда всё хорошо", score: { state: 2 } },
      { text: "Что-то важное потеряла — не пойму что именно", score: { state: 1 } },
      { text: "На автопилоте. Живу, но не чувствую что живу", score: { state: 1 } }
    ]
  },
  {
    zone: "Состояние",
    text: "Что чаще всего мешает тебе двигаться туда, куда хочешь?",
    options: [
      { text: "Я сама. Знаю что делать — и не делаю", score: { state: 2 } },
      { text: "Страх что ничего не выйдет — лучше не начинать", score: { state: 2 } },
      { text: "Слишком много всего — не знаю с чего начать", score: { state: 1 } },
      { text: "Ощущение что я не заслуживаю большего", score: { state: 1 } }
    ]
  }
];

const results = {
  money: [
    {
      level: "high",
      title: "Денежный блок — настоящий",
      text: "Дело не в том, сколько ты зарабатываешь. Дело в том, что где-то внутри сидит убеждение: деньги либо не для тебя, либо приходят только через усилие и боль. <strong>Это не твой характер — это паттерн, который прописан в карте и который можно изменить.</strong>"
    },
    {
      level: "low",
      title: "Деньги — не главный тормоз",
      text: "С деньгами у тебя скорее отношения «могло быть лучше, но терпимо». Настоящее застревание — в другом. <strong>Хотя финансовый потолок всё равно есть — просто он пока не болит достаточно сильно.</strong>"
    }
  ],
  relations: [
    {
      level: "high",
      title: "Отношения — больная точка",
      text: "Ты, скорее всего, умеешь любить. Но что-то в том, как ты выбираешь людей или как себя ведёшь рядом с ними — воспроизводит одну и ту же боль. <strong>Это не судьба и не случайность. Это паттерн — и он виден в карте.</strong>"
    },
    {
      level: "low",
      title: "Отношения — не главный тормоз",
      text: "В этой зоне у тебя относительно стабильно. Есть нюансы, но они не парализуют. <strong>Основная энергия застряла в другом месте.</strong>"
    }
  ],
  state: [
    {
      level: "high",
      title: "Внутреннее состояние — на нуле",
      text: "Ты функционируешь. Но где-то потеряла ощущение что это твоя жизнь, а не чужой сценарий. Усталость, тревога, автопилот — это симптомы. <strong>Причина глубже. И она точно есть в карте.</strong>"
    },
    {
      level: "low",
      title: "Состояние — держишься",
      text: "Бывает тяжело, но ты справляешься. Основной затык — не в ресурсе, а в чём-то конкретном. <strong>Главное — не путать «терплю» с «ок».</strong>"
    }
  ]
};

let currentQ = 0;
let scores = { money: 0, relations: 0, state: 0 };
let answers = [];

function startQuiz() {
  showScreen('screen-q');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  const pct = (currentQ / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  const html = `
    <div class="q-zone">${q.zone}</div>
    <div class="q-number">Вопрос ${currentQ + 1} из ${total}</div>
    <div class="q-text">${q.text}</div>
    <div class="options">
      ${q.options.map((o, i) => `
        <button class="option" onclick="selectOption(${i})">${o.text}</button>
      `).join('')}
    </div>
  `;
  document.getElementById('screen-q').innerHTML = html;
}

function selectOption(i) {
  const q = questions[currentQ];
  const chosen = q.options[i];

  // visual feedback
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.classList.remove('selected');
    if (idx === i) el.classList.add('selected');
  });

  // score
  for (const [key, val] of Object.entries(chosen.score)) {
    scores[key] += val;
  }
  answers.push(i);

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 350);
}

function showResult() {
  document.getElementById('progressFill').style.width = '100%';

  const moneyResult = scores.money >= 3 ? results.money[0] : results.money[1];
  const relResult = scores.relations >= 3 ? results.relations[0] : results.relations[1];
  const stateResult = scores.state >= 3 ? results.state[0] : results.state[1];

  // find primary block (highest score)
  const maxZone = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const zoneNames = { money: 'деньгах', relations: 'отношениях', state: 'состоянии' };

  const html = `
    <div class="result-eyebrow">Твой разбор готов</div>
    <h2 class="result-title">Вот где застряла<br>твоя энергия</h2>
    <div class="deco-line"></div>

    <div class="result-block">
      <div class="result-block-label">Деньги</div>
      <div class="result-block-title">${moneyResult.title}</div>
      <div class="result-block-text">${moneyResult.text}</div>
    </div>

    <div class="result-block">
      <div class="result-block-label">Отношения</div>
      <div class="result-block-title">${relResult.title}</div>
      <div class="result-block-text">${relResult.text}</div>
    </div>

    <div class="result-block">
      <div class="result-block-label">Состояние</div>
      <div class="result-block-title">${stateResult.title}</div>
      <div class="result-block-text">${stateResult.text}</div>
    </div>

    <div class="offer-block">
      <div class="offer-label">Следующий шаг</div>
      <div class="offer-title">Узнай точную причину<br>в личной диагностике</div>
      <div class="offer-text">Разбор по твоей натальной карте: астрология + Таро + ПВС в синтезе. Не поверхностно — в глубину. Уходишь не с предсказанием, а с пониманием что именно держит и как это убрать.</div>
      <a href="https://t.me/jain1109" target="_blank" class="btn-offer">Записаться на диагностику</a>
      <div class="offer-price">1 999 ₽ · 60 минут · результат сразу</div>
    </div>
  `;

  document.getElementById('screen-result').innerHTML = html;
  showScreen('screen-result');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
